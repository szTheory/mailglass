<!DOCTYPE html>
<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:v="urn:schemas-microsoft-com:vml">
<head>
<meta charset="utf-8" />
<!--[if gte mso 9]><xml>
  <o:OfficeDocumentSettings>
    <o:AllowPNG/>
    <o:PixelsPerInch>96</o:PixelsPerInch>

</xml><![endif]-->
<style type="text/css">
  body { margin: 0; padding: 0; background-color: #F8FBFD; }
  .container { max-width: 600px; margin: 0 auto; }
  .btn { display: inline-block; padding: 12px 24px; font-family: sans-serif; }
</style>
</head>
<body>
  <div class="container">
    <!--[if mso]><table role="presentation" width="100%"><tr><![endif]-->
    <!--[if mso]><td valign="top" width="300"><![endif]-->
    <div style="display:inline-block;width:300px;">Column 1 content</div>
    <!--[if mso]></td><![endif]-->
    <!--[if mso]><td valign="top" width="300"><![endif]-->
    <div style="display:inline-block;width:300px;">Column 2 content</div>
    <!--[if mso]></td><![endif]-->
    <!--[if mso]></tr></table><![endif]-->

    <!--[if mso]>
    <v:roundrect xmlns:v="urn:schemas-microsoft-com:vml"
                 xmlns:w="urn:schemas-microsoft-com:office:word"
                 href="https://example.com"
                 style="height:44px;v-text-anchor:middle;width:200px;"
                 arcsize="8%"
                 fillcolor="#277B96"
                 strokecolor="#277B96">
      <w:anchorlock/>
      <center style="font-family:sans-serif;font-size:16px;color:#FFFFFF;">Click me</center>
    </v:roundrect>
    <![endif]-->
    <!--[if !mso]><!-->
    <a href="https://example.com" class="btn" style="mso-hide:all;">Click me</a>
    <!--<![endif]-->
  </div>

</html>
