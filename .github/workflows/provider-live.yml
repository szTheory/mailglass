name: Provider Live

on:
  schedule:
    - cron: "33 6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: provider-live-${{ github.ref }}
  cancel-in-progress: true

jobs:
  provider_live:
    name: Provider Live Advisory (Elixir 1.18 / OTP 27)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      MIX_ENV: test
      POSTGRES_HOST: localhost
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Set up OTP + Elixir
        uses: erlef/setup-beam@5304e04ea2b355f03681464e683d92e3b2f18451
        with:
          elixir-version: "1.18"
          otp-version: "27"
      - name: Install deps
        run: mix deps.get
      - name: Run provider-live tests
        run: mix test --only provider_live --warnings-as-errors

  notify_provider_live_failure:
    name: provider-live failure notification
    runs-on: ubuntu-latest
    needs: [provider_live]
    if: failure()
    continue-on-error: true
    steps:
      - name: Add provider-live failure summary
        run: |
          {
            echo "## provider-live failure"
            echo
            echo "Provider-live advisory tests failed."
            echo "Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Open or update provider-live failure issue
        continue-on-error: true
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const label = "ci/provider-live";
            const issueTitle = "provider-live failure tracker";
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const body = [
              "provider-live failure detected.",
              "",
              `- Workflow run: ${runUrl}`,
              `- Ref: \`${context.ref}\``,
              `- SHA: \`${context.sha}\``
            ].join("\n");

            try {
              await github.rest.issues.getLabel({owner, repo, name: label});
            } catch (error) {
              if (error.status === 404) {
                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name: label,
                  color: "B60205",
                  description: "Tracked failures for provider-live advisory workflow"
                });
              } else {
                throw error;
              }
            }

            const {data: openIssues} = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: "open",
              labels: label,
              per_page: 100
            });

            const existing = openIssues.find((issue) => issue.title === issueTitle);

            if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title: issueTitle,
                body,
                labels: [label]
              });
            }
