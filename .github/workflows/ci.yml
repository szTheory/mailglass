name: CI

# NOTE: Third-party actions below use tag references (@v4, @v1) for a
# working first-run CI. CLAUDE.md mandates commit-SHA pinning (CI-04) —
# Dependabot will bump these to SHAs on first dependency scan, OR pin
# manually before shipping v0.1. Tracked in Phase 7 (CI/CD + Docs).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  phase-02-uat:
    name: Phase 02 UAT (verify.phase_02)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      MIX_ENV: test
      POSTGRES_HOST: localhost
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up OTP + Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: "27.1"
          elixir-version: "1.18.1"

      - name: Restore deps + _build cache
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-

      - name: Install deps
        run: mix deps.get

      - name: Run Phase 02 UAT gate (verify.phase_02)
        run: mix verify.phase_02

  cold-start:
    name: Cold Start (verify.cold_start)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      MIX_ENV: test
      POSTGRES_HOST: localhost
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up OTP + Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: "27.1"
          elixir-version: "1.18.1"

      - name: Restore deps + _build cache
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-

      - name: Install deps
        run: mix deps.get

      - name: Run cold-start suite (verify.cold_start)
        run: mix verify.cold_start

  no-optional-deps:
    name: Compile (no optional deps)
    runs-on: ubuntu-latest

    env:
      MIX_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up OTP + Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: "27.1"
          elixir-version: "1.18.1"

      - name: Restore deps + _build cache
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build-no-opt
          key: ${{ runner.os }}-mix-noopt-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-noopt-

      - name: Install deps (no optional)
        run: mix deps.get --only $MIX_ENV

      - name: Compile without optional deps
        run: mix compile --no-optional-deps --warnings-as-errors
